<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tally — split costs</title>
<meta name="theme-color" content="#10130f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23c9a227%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22%2310130f%22 font-family=%22Georgia%22>T</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --ink:#10130f; --paper:#181c16; --paper-raised:#20251d; --line:#343b2e;
    --gold:#c9a227; --gold-soft:#e8cf7a; --owe:#c4583b; --owed:#5e8c61;
    --text:#ece8da; --text-dim:#9aa092; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:'Iowan Old Style','Georgia',serif;-webkit-tap-highlight-color:transparent;}
  body{padding-bottom:90px;}
  .mono{font-family:'SF Mono','Courier New',monospace;}
  h1,h2,h3{font-family:'Iowan Old Style','Georgia',serif;font-weight:600;margin:0;}
  ::selection{background:var(--gold);color:var(--ink);}

  header.top{position:sticky;top:0;z-index:20;background:linear-gradient(to bottom, var(--ink) 80%, transparent);padding:18px 18px 8px;display:flex;align-items:center;justify-content:space-between;}
  header.top .brand{display:flex;align-items:center;gap:10px;}
  header.top .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:var(--ink);font-weight:700;font-size:18px;flex-shrink:0;}
  header.top .brand .ttl{font-size:21px;letter-spacing:.2px;}
  header.top .sub{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;display:flex;align-items:center;gap:6px;}
  #backBtn{background:none;border:1px solid var(--line);color:var(--text-dim);border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--owed);display:inline-block;}
  .status-dot.off{background:var(--owe);}

  main{padding:0 18px;max-width:560px;margin:0 auto;}

  .tabs{display:flex;gap:6px;margin:10px 0 14px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:4px;}
  .tabs button{flex:1;padding:9px;background:transparent;border:none;border-radius:9px;color:var(--text-dim);font-size:13.5px;cursor:pointer;font-family:inherit;}
  .tabs button.sel{background:var(--gold);color:var(--ink);font-weight:600;}

  .scenario-grid{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .scenario-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s, transform .1s;}
  .scenario-card:active{transform:scale(.985);}
  .scenario-card:hover{border-color:var(--gold);}
  .scenario-card .icon{width:46px;height:46px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
  .scenario-card .body{flex:1;min-width:0;}
  .scenario-card .name{font-size:17px;}
  .scenario-card .meta{font-size:12.5px;color:var(--text-dim);margin-top:2px;font-family:'SF Mono','Courier New',monospace;}
  .scenario-card .total{text-align:right;font-family:'SF Mono','Courier New',monospace;font-size:15px;color:var(--gold-soft);flex-shrink:0;}
  .scenario-card .total small{display:block;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-family:inherit;}

  .tag-home{background:#2b3a2c;color:#9fd39f;} .tag-trip{background:#2c3046;color:#a9b6f2;}
  .tag-outing{background:#3a2c1f;color:#e0b285;} .tag-custom{background:#332a3a;color:#c9a8e6;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-dim);}
  .empty-state .glyph{font-size:34px;margin-bottom:10px;opacity:.6;}
  .empty-state p{font-size:14px;line-height:1.5;max-width:280px;margin:6px auto 0;}

  .fab{position:fixed;bottom:24px;right:18px;z-index:30;width:58px;height:58px;border-radius:50%;background:var(--gold);color:var(--ink);border:none;font-size:28px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(201,162,39,.35);}
  .fab:active{transform:scale(.93);}
  .fab-secondary{position:fixed;bottom:24px;left:18px;z-index:30;background:var(--paper-raised);border:1px solid var(--line);color:var(--gold-soft);border-radius:30px;padding:14px 18px;font-size:13.5px;cursor:pointer;}

  .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s;}
  .sheet-backdrop.open{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--paper-raised);border-top:1px solid var(--line);border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);padding:10px 20px calc(28px + env(safe-area-inset-bottom));}
  .sheet.open{transform:translateY(0);}
  .sheet .grabber{width:36px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 16px;}
  .sheet h2{font-size:19px;margin-bottom:14px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;}
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold);}
  .icon-pick{display:flex;gap:8px;flex-wrap:wrap;}
  .icon-pick button{width:44px;height:44px;border-radius:10px;border:1px solid var(--line);background:var(--ink);font-size:19px;cursor:pointer;color:var(--text);}
  .icon-pick button.sel{border-color:var(--gold);background:#2a2310;}
  .btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .btn{flex:1;padding:13px;border-radius:11px;border:none;font-size:15px;cursor:pointer;font-family:'Iowan Old Style','Georgia',serif;font-weight:600;min-width:100px;}
  .btn-primary{background:var(--gold);color:var(--ink);}
  .btn-primary:active{filter:brightness(.92);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text-dim);}
  .btn-danger{background:transparent;border:1px solid var(--owe);color:var(--owe);}

  .member-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .member-row{display:flex;align-items:center;gap:10px;background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:9px 12px;}
  .member-row .av{width:30px;height:30px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .member-row .nm{flex:1;font-size:14.5px;}
  .member-row .you-tag{font-size:10px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.5px;}
  .member-row button.rm{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}
  .add-member-row{display:flex;gap:8px;margin-top:10px;}
  .add-member-row input{flex:1;}
  .small-btn{background:var(--ink);border:1px solid var(--line);color:var(--gold-soft);border-radius:10px;padding:0 14px;font-size:13.5px;cursor:pointer;white-space:nowrap;}

  .balance-strip{display:flex;gap:10px;overflow-x:auto;padding:14px 0 4px;margin-bottom:6px;-webkit-overflow-scrolling:touch;}
  .balance-card{flex-shrink:0;min-width:118px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 13px;}
  .balance-card .nm{font-size:13px;color:var(--text-dim);}
  .balance-card .amt{font-family:'SF Mono','Courier New',monospace;font-size:16px;margin-top:4px;}
  .amt.pos{color:var(--owed);} .amt.neg{color:var(--owe);} .amt.zero{color:var(--text-dim);}

  .settle-box{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin:14px 0;}
  .settle-box h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:10px;}
  .settle-line{display:flex;align-items:center;gap:8px;font-size:14px;padding:8px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .settle-line:last-child{border-bottom:none;}
  .settle-line .arrow{color:var(--gold);}
  .settle-line .amt{margin-left:auto;font-family:'SF Mono','Courier New',monospace;color:var(--gold-soft);}
  .settle-line .mark-paid{background:none;border:1px solid var(--owed);color:var(--owed);border-radius:20px;padding:4px 10px;font-size:11.5px;cursor:pointer;}
  .settle-empty{color:var(--text-dim);font-size:14px;text-align:center;padding:8px 0;}

  .expense-list{margin-top:8px;display:flex;flex-direction:column;gap:8px;}
  .expense-row{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;}
  .expense-row .ic{width:38px;height:38px;border-radius:9px;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .expense-row .info{flex:1;min-width:0;}
  .expense-row .ttl{font-size:15px;}
  .expense-row .meta{font-size:12px;color:var(--text-dim);margin-top:1px;font-family:'SF Mono','Courier New',monospace;}
  .expense-row .amt{font-family:'SF Mono','Courier New',monospace;font-size:15.5px;color:var(--gold-soft);}

  .section-label{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin:20px 0 4px;display:flex;justify-content:space-between;align-items:center;}
  .section-label a{color:var(--gold-soft);font-size:12px;cursor:pointer;text-transform:none;letter-spacing:0;}

  .split-row{display:flex;align-items:center;gap:10px;padding:7px 0;}
  .split-row .nm{flex:1;font-size:14.5px;}
  .split-row input[type=number]{width:90px;text-align:right;}
  .split-toggle{display:flex;background:var(--ink);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:10px;}
  .split-toggle button{flex:1;padding:9px 4px;background:transparent;border:none;color:var(--text-dim);font-size:12.5px;cursor:pointer;}
  .split-toggle button.sel{background:var(--gold);color:var(--ink);font-weight:600;}
  .split-hint{font-size:11.5px;color:var(--text-dim);margin:-4px 0 8px;}

  .report-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .report-card h4{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:10px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13.5px;}
  .bar-row .lbl{width:90px;flex-shrink:0;color:var(--text-dim);}
  .bar-track{flex:1;height:8px;background:var(--ink);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--gold);}
  .bar-row .val{width:64px;text-align:right;font-family:'SF Mono','Courier New',monospace;font-size:12.5px;flex-shrink:0;}

  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--paper-raised);border:1px solid var(--gold);color:var(--text);padding:10px 18px;border-radius:30px;font-size:13.5px;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s, bottom .2s;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;bottom:110px;}
  .share-code-box{background:var(--ink);border:1px dashed var(--gold);border-radius:10px;padding:12px;text-align:center;font-family:'SF Mono','Courier New',monospace;font-size:22px;letter-spacing:3px;color:var(--gold-soft);margin-bottom:10px;}
  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div id="backWrap"></div>
    <div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="mark">T</div>
        <div class="ttl" id="headerTitle">Tally</div>
      </div>
      <div class="sub"><span class="status-dot" id="statusDot"></span><span id="headerSub">your shared expenses</span></div>
    </div>
  </div>
</header>

<main id="app"></main>

<button class="fab" id="fabBtn">+</button>
<button class="fab-secondary" id="secondaryBtn" style="display:none;"></button>

<div class="sheet-backdrop" id="backdrop"></div>

<!-- New Scenario Sheet -->
<div class="sheet" id="sheetScenario">
  <div class="grabber"></div>
  <h2>New scenario</h2>
  <div class="field"><label>Name</label><input type="text" id="scName" placeholder="e.g. Goa Trip, Flat 4B, Friday Outing"></div>
  <div class="field"><label>Type</label>
    <div class="icon-pick" id="scIconPick">
      <button data-v="home" class="sel">🏠</button>
      <button data-v="trip">✈️</button>
      <button data-v="outing">🍻</button>
      <button data-v="custom">📦</button>
    </div>
  </div>
  <div class="field" id="customTypeField" style="display:none;"><label>Type name</label><input type="text" id="scCustomType" placeholder="e.g. Office Pool, Renovation"></div>
  <div class="field"><label>Base currency</label>
    <select id="scCurrency">
      <option value="₹">₹ INR</option><option value="$">$ USD</option><option value="£">£ GBP</option>
      <option value="€">€ EUR</option><option value="A$">A$ AUD</option><option value="C$">C$ CAD</option>
    </select>
  </div>
  <div class="field"><label>Your name (so people know who you are)</label><input type="text" id="scYourName" placeholder="Your name"></div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="scCancel">Cancel</button>
    <button class="btn btn-primary" id="scSave">Create</button>
  </div>
</div>

<!-- Join Scenario Sheet -->
<div class="sheet" id="sheetJoin">
  <div class="grabber"></div>
  <h2>Join a tab</h2>
  <div class="field"><label>Share code</label><input type="text" id="joinCode" placeholder="e.g. 7F3K2Q" style="text-transform:uppercase;letter-spacing:2px;"></div>
  <div class="field"><label>Your name</label><input type="text" id="joinName" placeholder="Your name"></div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="joinCancel">Cancel</button>
    <button class="btn btn-primary" id="joinSave">Join</button>
  </div>
</div>

<!-- Members Sheet -->
<div class="sheet" id="sheetMembers">
  <div class="grabber"></div>
  <h2>People</h2>
  <div class="share-code-box" id="shareCodeDisplay"></div>
  <div style="font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:14px;">Share this code — others can join from their own device and add expenses.</div>
  <div class="member-list" id="memberList"></div>
  <div class="add-member-row">
    <input type="text" id="newMemberName" placeholder="Add person by name">
    <button class="small-btn" id="addMemberBtn">Add</button>
  </div>
  <div style="text-align:center;margin-top:8px;">
    <button class="small-btn" id="pickContactBtn">📱 Pick from phone contacts (if supported)</button>
  </div>
  <div class="btn-row"><button class="btn btn-primary" id="membersDone">Done</button></div>
</div>

<!-- New Expense Sheet -->
<div class="sheet" id="sheetExpense">
  <div class="grabber"></div>
  <h2 id="expSheetTitle">New expense</h2>
  <div class="field"><label>Category</label>
    <select id="expCategory"></select>
  </div>
  <div class="field" id="customCatField" style="display:none;"><label>Type your own</label><input type="text" id="expCustomCat" placeholder="e.g. Pharmacy"></div>
  <div class="field"><label>Description</label><input type="text" id="expDesc" placeholder="e.g. Dinner at the rooftop place"></div>
  <div class="field" style="display:flex;gap:10px;">
    <div style="flex:1;"><label>Amount</label><input type="number" id="expAmount" placeholder="0.00" inputmode="decimal"></div>
    <div style="width:90px;"><label>Currency</label>
      <select id="expCurrency">
        <option value="₹">₹</option><option value="$">$</option><option value="£">£</option>
        <option value="€">€</option><option value="A$">A$</option><option value="C$">C$</option>
      </select>
    </div>
  </div>
  <div id="conversionNote" style="font-size:12px;color:var(--text-dim);margin:-6px 0 12px;"></div>
  <div class="field"><label>Paid by</label><select id="expPaidBy"></select></div>
  <div class="field">
    <label>Split between</label>
    <div class="split-toggle">
      <button data-v="equal" class="sel">Equal</button>
      <button data-v="amount">By amount</button>
      <button data-v="ratio">By ratio</button>
    </div>
    <div class="split-hint" id="splitHint"></div>
    <div id="splitMembers"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-danger" id="expDeleteBtn" style="display:none;">Delete</button>
    <button class="btn btn-primary" id="expSave">Save</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===========================================================
   CONFIG — Supabase
=========================================================== */
const SUPABASE_URL = 'https://moaxmlpvctbmvtjahzqx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vYXhtbHB2Y3RibXZ0amFoenF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMzY3MzIsImV4cCI6MjA5NzYxMjczMn0.N3msjdxHLtHqvO5NJL4MuOfm4qjIotkVobmR_fQqVX0';
let sb = null;
try{
  if(window.supabase && typeof window.supabase.createClient === 'function'){
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } else {
    console.warn('Supabase library not available — running in local-only mode');
  }
}catch(e){
  console.warn('Supabase init failed — running in local-only mode', e);
  sb = null;
}
function sbReady(){ return !!sb; }

/* ===========================================================
   LOCAL CACHE / OFFLINE QUEUE
=========================================================== */
const CACHE_KEY = 'tally_cache_v2';
const IDENTITY_KEY = 'tally_identity_v2';
const OUTBOX_KEY = 'tally_outbox_v2';

function loadCache(){ try{ return JSON.parse(localStorage.getItem(CACHE_KEY)) || {scenarios:{}}; }catch(e){ return {scenarios:{}}; } }
function saveCache(){ localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); }
function loadIdentity(){ try{ return JSON.parse(localStorage.getItem(IDENTITY_KEY)) || {}; }catch(e){ return {}; } }
function saveIdentity(){ localStorage.setItem(IDENTITY_KEY, JSON.stringify(identity)); }
function loadOutbox(){ try{ return JSON.parse(localStorage.getItem(OUTBOX_KEY)) || []; }catch(e){ return []; } }
function saveOutbox(){ localStorage.setItem(OUTBOX_KEY, JSON.stringify(outbox)); }

let cache = loadCache();          // {scenarios: { [id]: {scenario, members:[], expenses:[], settlements:[]} }}
let identity = loadIdentity();    // { [scenarioId]: memberId }
let outbox = loadOutbox();        // [{table, op, payload}]

let currentScenarioId = null;
let editingExpenseId = null;
let splitMode = 'equal';
let activeHomeTab = 'active'; // active | history

const ICONS = {home:'🏠', trip:'✈️', outing:'🍻', custom:'📦'};
const TAGCLASS = {home:'tag-home', trip:'tag-trip', outing:'tag-outing', custom:'tag-custom'};
const CATEGORIES = {
  home: ['Rent','Electricity','Water','Internet/Wifi','Groceries','Maintenance','Gas/Cooking','Cleaning','Other'],
  trip: ['Flights','Hotel/Stay','Food & Drinks','Local Transport','Activities','Shopping','Fuel','Other'],
  outing: ['Food & Drinks','Tickets/Cover charge','Transport (cab/auto)','Games/Activities','Other'],
  custom: ['Miscellaneous','Shared purchase','Other']
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function genShareCode(){ const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
function fmt(n){ return (Math.round((n||0)*100)/100).toFixed(2); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ===========================================================
   ONLINE STATUS + SYNC
=========================================================== */
function setStatus(){
  const dot = document.getElementById('statusDot');
  dot.classList.toggle('off', !navigator.onLine);
}
window.addEventListener('online', ()=>{ setStatus(); flushOutbox(); });
window.addEventListener('offline', setStatus);

async function flushOutbox(){
  if(!sbReady() || !navigator.onLine || outbox.length===0) return;
  const pending = [...outbox];
  for(const job of pending){
    try{
      if(job.op==='insert') await sb.from(job.table).insert(job.payload);
      else if(job.op==='update') await sb.from(job.table).update(job.payload.data).eq('id', job.payload.id);
      else if(job.op==='delete') await sb.from(job.table).delete().eq('id', job.payload.id);
      outbox.shift(); saveOutbox();
    }catch(e){ break; } // stop on first failure, retry later
  }
  showToast('Synced ✓');
}
function queueWrite(table, op, payload){
  outbox.push({table, op, payload}); saveOutbox();
  if(navigator.onLine) flushOutbox();
}

async function pullScenario(scenarioId){
  if(!sbReady() || !navigator.onLine) return false;
  try{
    const [{data:sc}, {data:members}, {data:expenses}, {data:settlements}] = await Promise.all([
      sb.from('scenarios').select('*').eq('id', scenarioId).single(),

/* ===========================================================
   CURRENCY CONVERSION (frankfurter.app — free, no key)
=========================================================== */
const CCY_CODE = {'₹':'INR','$':'USD','£':'GBP','€':'EUR','A$':'AUD','C$':'CAD'};
const RATES_CACHE_KEY = 'tally_rates_v1';
async function getRate(from, to){
  if(from===to) return 1;
  const fc = CCY_CODE[from], tc = CCY_CODE[to];
  if(!fc || !tc) return 1;
  let rc = {}; try{ rc = JSON.parse(localStorage.getItem(RATES_CACHE_KEY))||{}; }catch(e){}
  const key = fc+'_'+tc;
  const cached = rc[key];
  const dayMs = 24*60*60*1000;
  if(cached && (Date.now()-cached.t < dayMs)) return cached.rate;
  if(!navigator.onLine) return cached ? cached.rate : 1;
  try{
    const res = await fetch(`https://api.frankfurter.app/latest?from=${fc}&to=${tc}`);
    const data = await res.json();
    const rate = data.rates[tc];
    rc[key] = {rate, t:Date.now()};
    localStorage.setItem(RATES_CACHE_KEY, JSON.stringify(rc));
    return rate;
  }catch(e){ return cached ? cached.rate : 1; }
}

/* ===========================================================
   BALANCES + SETTLE-UP
=========================================================== */
function computeBalances(b){
  const bal = {};
  b.members.forEach(m=> bal[m.id]=0);
  b.expenses.forEach(e=>{
    bal[e.paid_by] = (bal[e.paid_by]||0) + Number(e.amount);
    Object.entries(e.splits||{}).forEach(([mid, amt])=>{ bal[mid] = (bal[mid]||0) - Number(amt); });
  });
  b.settlements.forEach(s=>{
    bal[s.from_member] = (bal[s.from_member]||0) + Number(s.amount); // they paid, so they owe less
    bal[s.to_member] = (bal[s.to_member]||0) - Number(s.amount); // they received, so owed less
  });
  return bal;
}
function settleUp(bal){
  const creditors=[], debtors=[];
  Object.entries(bal).forEach(([id, amt])=>{
    const r = Math.round(amt*100)/100;
    if(r>0.005) creditors.push({id, amt:r});
    else if(r<-0.005) debtors.push({id, amt:-r});
  });
  creditors.sort((a,b)=>b.amt-a.amt); debtors.sort((a,b)=>b.amt-a.amt);
  const txns=[]; let i=0,j=0;
  while(i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].amt, creditors[j].amt);
    txns.push({from:debtors[i].id, to:creditors[j].id, amount:pay});
    debtors[i].amt-=pay; creditors[j].amt-=pay;
    if(debtors[i].amt<0.01) i++; if(creditors[j].amt<0.01) j++;
  }
  return txns;
}

function renderReports(b, bal){

      const checked = exp ? (exp.splits && exp.splits[m.id]!==undefined) : true;
      return `<div class="split-row"><input type="checkbox" data-id="${m.id}" class="eq-check" ${checked?'checked':''}><div class="nm">${escapeHtml(m.name)}</div></div>`;
    }).join('');
  } else if(splitMode==='amount'){
    wrap.innerHTML = b.members.map(m=>{
      const v = exp && exp.splits && exp.splits[m.id]!==undefined ? exp.splits[m.id] : '';
      return `<div class="split-row"><div class="nm">${escapeHtml(m.name)}</div><input type="number" class="amt-input" data-id="${m.id}" placeholder="0.00" value="${v}"></div>`;
    }).join('');
  } else { // ratio
    wrap.innerHTML = b.members.map(m=>{
      const v = exp && exp.ratios && exp.ratios[m.id]!==undefined ? exp.ratios[m.id] : '';
      return `<div class="split-row"><div class="nm">${escapeHtml(m.name)}</div><input type="number" class="ratio-input" data-id="${m.id}" placeholder="0" value="${v}"></div>`;
    }).join('');
  }
}

document.getElementById('expDeleteBtn').addEventListener('click', ()=>{
  const b = getBundle();
  b.expenses = b.expenses.filter(e=>e.id!==editingExpenseId); saveCache();
  queueWrite('expenses','delete',{id:editingExpenseId});
  closeSheets(); render(); showToast('Expense deleted');
});

document.getElementById('expSave').addEventListener('click', async ()=>{
  const b = getBundle(); const sc = b.scenario;
  const catSel = document.getElementById('expCategory').value;
  const category = catSel==='__custom' ? document.getElementById('expCustomCat').value.trim() : catSel;
  const desc = document.getElementById('expDesc').value.trim();
  const enteredAmount = Number(document.getElementById('expAmount').value);
  const expCurrency = document.getElementById('expCurrency').value;
  const paidBy = document.getElementById('expPaidBy').value;
  if(!desc){ showToast('Add a description'); return; }
  if(!enteredAmount || enteredAmount<=0){ showToast('Enter a valid amount'); return; }
  if(!category){ showToast('Pick or type a category'); return; }

  let amount = enteredAmount;
  if(expCurrency !== sc.currency){
    const rate = await getRate(expCurrency, sc.currency);
    amount = enteredAmount * rate;
  }

  let splits = {}; let ratios = null;
  if(splitMode==='equal'){
    const ids = Array.from(document.querySelectorAll('.eq-check')).filter(c=>c.checked).map(c=>c.dataset.id);
    if(ids.length===0){ showToast('Pick at least one person'); return; }
    const share = amount/ids.length;
    ids.forEach(id=> splits[id]=share);
  } else if(splitMode==='amount'){
    let total=0;
    document.querySelectorAll('.amt-input').forEach(inp=>{ const v=Number(inp.value)||0; if(v>0){ splits[inp.dataset.id]=v; total+=v; } });
    if(Object.keys(splits).length===0){ showToast('Enter at least one amount'); return; }
    if(Math.abs(total-amount) > 0.02){ showToast(`Splits total ${fmt(total)}, expected ${fmt(amount)}`); return; }
  } else { // ratio
    ratios = {}; let totalRatio=0;
    document.querySelectorAll('.ratio-input').forEach(inp=>{ const v=Number(inp.value)||0; if(v>0){ ratios[inp.dataset.id]=v; totalRatio+=v; } });
    if(totalRatio===0){ showToast('Enter at least one ratio'); return; }
    Object.entries(ratios).forEach(([mid,r])=>{ splits[mid] = amount * (r/totalRatio); });
  }

  if(editingExpenseId){
    const exp = b.expenses.find(e=>e.id===editingExpenseId);
    Object.assign(exp, {description:desc, category, amount, currency:sc.currency, paid_by:paidBy, split_mode:splitMode, splits, ratios});
    saveCache();
    queueWrite('expenses','update',{id:exp.id, data:{description:desc, category, amount, currency:sc.currency, paid_by:paidBy, split_mode:splitMode, splits, ratios}});
  } else {
    const rec = {id:uid(), scenario_id:currentScenarioId, description:desc, category, amount, currency:sc.currency, paid_by:paidBy, split_mode:splitMode, splits, ratios, created_at:new Date().toISOString()};
    b.expenses.push(rec); saveCache();
    queueWrite('expenses','insert', rec);
  }
  closeSheets(); render(); showToast('Saved');
});

/* ===========================================================
   EXPORT (CSV + email)
=========================================================== */
function buildCsv(b){
  const sc = b.scenario;
  const rows = [['Date','Category','Description','Amount','Currency','Paid By','Split Details']];
  [...b.expenses].sort((a,c)=>new Date(a.created_at)-new Date(c.created_at)).forEach(e=>{
    const splitStr = Object.entries(e.splits||{}).map(([mid,amt])=> `${memberName(b,mid)}:${fmt(amt)}`).join('; ');
    rows.push([
      new Date(e.created_at).toLocaleDateString(),
      e.category||'', e.description, fmt(e.amount), sc.currency, memberName(b,e.paid_by), splitStr
    ]);
  });
  rows.push([]); rows.push(['Settlement summary']);
  const bal = computeBalances(b); const txns = settleUp(bal);
  if(txns.length===0) rows.push(['All settled up']);
  txns.forEach(t=> rows.push([`${memberName(b,t.from)} pays ${memberName(b,t.to)}`, fmt(t.amount)+' '+sc.currency]));
  return rows.map(r=> r.map(cell=>{
    const s = String(cell??''); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\n');
}
function openExportOptions(){
  const b = getBundle();
  const csv = buildCsv(b);
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${b.scenario.name.replace(/[^a-z0-9]/gi,'_')}_tally.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);

  // Build a plain-text summary for email
  const bal = computeBalances(b); const txns = settleUp(bal);
  let body = `Tally summary — ${b.scenario.name}\n\n`;
  txns.forEach(t=> body += `${memberName(b,t.from)} pays ${memberName(b,t.to)}: ${b.scenario.currency}${fmt(t.amount)}\n`);
  if(txns.length===0) body += 'Everyone is settled up.\n';
  const mailto = `mailto:?subject=${encodeURIComponent('Tally — '+b.scenario.name)}&body=${encodeURIComponent(body)}`;
  setTimeout(()=>{
    if(confirm('CSV downloaded. Also open an email with the settlement summary?')) window.location.href = mailto;
  }, 300);
}
